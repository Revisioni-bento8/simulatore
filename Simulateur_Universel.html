<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Universel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== DESIGN SYSTEM: MONOCHROME ===== */
        :root {
            --bg:        #ffffff;
            --surface:   #f5f5f5;
            --border:    #e0e0e0;
            --border2:   #bdbdbd;
            --text:      #111111;
            --muted:     #666666;
            --faint:     #999999;
            --black:     #111111;
            --white:     #ffffff;
        }
        [data-theme="dark"] {
            --bg:        #111111;
            --surface:   #1c1c1c;
            --border:    #2a2a2a;
            --border2:   #444444;
            --text:      #f0f0f0;
            --muted:     #999999;
            --faint:     #666666;
            --black:     #f0f0f0;
            --white:     #1c1c1c;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-text-size-adjust: none; }
        body {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            transition: background 0.2s, color 0.2s;
        }

        /* ===== APP CONTAINER ===== */
        #app {
            max-width: 680px;
            margin: 0 auto;
            border: 1px solid var(--border);
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        #title-display {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.01em;
            cursor: pointer;
            border-bottom: 1px dashed var(--border2);
            min-width: 60px;
        }
        #title-display:hover { border-bottom-color: var(--text); }
        #title-input {
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-bottom: 2px solid var(--text);
            background: transparent;
            color: var(--text);
            outline: none;
            width: 200px;
            font-family: inherit;
        }
        .header-right { display: flex; gap: 8px; }
        .hbtn {
            background: none;
            border: 1px solid var(--border2);
            color: var(--muted);
            font-size: 12px;
            padding: 4px 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
        }
        .hbtn:hover { color: var(--text); border-color: var(--text); }

        /* ===== MAIN ===== */
        main { padding: 28px 20px; min-height: 50vh; }

        /* ===== STATS BOX ===== */
        .stats-box {
            border: 1px solid var(--border);
            padding: 18px;
            margin-bottom: 24px;
        }
        .stats-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
        }
        .stats-row:last-child { border-bottom: none; }
        .stats-label { color: var(--muted); }
        .stats-value { font-weight: 600; }

        .chapter-section { margin-top: 16px; }
        .chapter-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .chapter-row:last-child { border-bottom: none; }
        .chapter-name { color: var(--muted); font-style: italic; }
        .chapter-stats { font-weight: 600; text-align: right; white-space: nowrap; }

        /* ===== MENU ===== */
        .menu-list { display: flex; flex-direction: column; gap: 1px; border: 1px solid var(--border); }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: var(--bg);
            border: none;
            color: var(--text);
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-family: inherit;
            width: 100%;
            transition: background 0.15s;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: var(--surface); }
        .menu-item:disabled { opacity: 0.35; cursor: not-allowed; }
        .menu-item-right { font-size: 12px; font-weight: 400; color: var(--muted); }

        /* ===== COUNTER ===== */
        .counter {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 0.02em;
        }

        /* ===== FLASHCARD ===== */
        .fc-area { perspective: 1200px; height: 300px; margin-bottom: 20px; }
        .fc-card {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .fc-card.flipped { transform: rotateY(180deg); }
        .fc-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            border: 1px solid var(--border);
            padding: 28px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            background: var(--bg);
            overflow-y: auto;
        }
        .fc-back { transform: rotateY(180deg); background: var(--surface); }
        .fc-face h3 { font-size: 16px; font-weight: 600; line-height: 1.5; }
        .fc-hint { font-size: 11px; color: var(--faint); margin-top: 16px; letter-spacing: 0.05em; }
        .fc-chapter { font-size: 11px; color: var(--faint); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }

        /* ===== EVAL BUTTONS ===== */
        .eval-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .eval-row button { flex: 1; }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 12px 20px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border2);
            background: var(--bg);
            color: var(--text);
            width: 100%;
            transition: background 0.15s;
        }
        .btn:hover { background: var(--surface); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-fill { background: var(--text); color: var(--bg); border-color: var(--text); }
        .btn-fill:hover { opacity: 0.85; background: var(--text); }
        .btn-back { margin-top: 12px; border-color: var(--border); color: var(--muted); }
        .btn-back:hover { color: var(--text); border-color: var(--border2); }

        /* ===== QCM ===== */
        .qcm-question { font-size: 16px; font-weight: 600; margin-bottom: 24px; line-height: 1.5; }
        .qcm-chapter { font-size: 11px; color: var(--faint); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
        .qcm-opt {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 14px 16px;
            border: 1px solid var(--border);
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s;
            background: var(--bg);
        }
        .qcm-opt:hover { background: var(--surface); }
        .qcm-opt input { margin-top: 3px; flex-shrink: 0; }
        .qcm-opt label { cursor: pointer; font-size: 14px; line-height: 1.5; }
        .qcm-opt.selected { border-color: var(--border2); background: var(--surface); }
        .qcm-opt.correct { border-color: var(--text); background: var(--surface); }
        .qcm-opt.wrong { border-color: var(--border2); background: var(--bg); }
        .qcm-opt.correct label::after { content: " ✓"; font-weight: 700; }
        .qcm-opt.wrong label::after { content: " ✗"; color: var(--muted); }
        .qcm-feedback {
            margin-top: 16px;
            padding: 14px;
            border: 1px solid var(--border);
            font-size: 14px;
            background: var(--surface);
            display: none;
        }
        .qcm-feedback .fb-label { font-weight: 700; margin-bottom: 6px; }
        .qcm-feedback .fb-exp { color: var(--muted); }

        /* ===== ADDON MODAL ===== */
        #addon-modal {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #addon-modal.open { display: flex; }
        .modal-box {
            background: var(--bg);
            border: 1px solid var(--border);
            max-width: 560px;
            width: 100%;
            padding: 24px;
        }
        .modal-box h3 { font-size: 16px; margin-bottom: 8px; }
        .modal-desc { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
        .modal-box textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            border: 1px solid var(--border2);
            background: var(--surface);
            color: var(--text);
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
            margin-bottom: 16px;
        }
        .modal-row { display: flex; gap: 10px; }
        .modal-row .btn { margin: 0; }

        /* ===== END SCREEN ===== */
        .end-box { text-align: center; padding: 40px 20px; }
        .end-box h2 { font-size: 22px; margin-bottom: 12px; }
        .end-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

        /* ===== UTILITY ===== */
        .hidden { display: none !important; }
        .mt12 { margin-top: 12px; }
        .mt20 { margin-top: 20px; }
    </style>
</head>
<body>

<div id="app">

    <header>
        <div id="title-area">
            <span id="title-display" title="Touchez pour modifier le titre"></span>
            <input id="title-input" type="text" class="hidden" maxlength="50" placeholder="Nom de la matière...">
        </div>
        <div class="header-right">
            <button class="hbtn" id="btn-theme">Nuit</button>
        </div>
    </header>

    <main>

        <!-- === MENU === -->
        <div id="view-menu">
            <!-- Stats -->
            <div class="stats-box" id="stats-box">
                <div class="stats-title">Statistiques</div>
                <div id="stats-global"></div>
                <div class="chapter-section" id="stats-chapters"></div>
            </div>

            <!-- Navigation -->
            <div class="menu-list">
                <button class="menu-item" onclick="startMode('fc')">
                    Flashcards
                    <span class="menu-item-right" id="lbl-fc">—</span>
                </button>
                <button class="menu-item" onclick="startMode('qcm')">
                    QCM
                    <span class="menu-item-right" id="lbl-qcm">—</span>
                </button>
                <button class="menu-item" id="btn-rev" onclick="startMode('rev')">
                    Révision des erreurs
                    <span class="menu-item-right" id="lbl-rev">—</span>
                </button>
                <button class="menu-item" onclick="openAddon()">
                    Implémentation
                    <span class="menu-item-right">Ajouter du contenu</span>
                </button>
            </div>
        </div>

        <!-- === FLASHCARDS === -->
        <div id="view-fc" class="hidden">
            <div class="counter" id="fc-counter">Carte 1 / —</div>
            <div class="fc-area">
                <div class="fc-card" id="fc-card" onclick="flipFC()">
                    <div class="fc-face fc-front">
                        <div class="fc-chapter" id="fc-chapter"></div>
                        <h3 id="fc-q"></h3>
                        <p class="fc-hint">Touchez pour retourner</p>
                    </div>
                    <div class="fc-face fc-back">
                        <div id="fc-a"></div>
                    </div>
                </div>
            </div>
            <div class="eval-row hidden" id="fc-eval">
                <button class="btn" onclick="evalFC(false)">À revoir</button>
                <button class="btn btn-fill" onclick="evalFC(true)">Je sais</button>
            </div>
            <button class="btn btn-back" onclick="goMenu()">Retour</button>
        </div>

        <!-- === QCM === -->
        <div id="view-qcm" class="hidden">
            <div class="counter" id="qcm-counter">Question 1 / —</div>
            <div class="qcm-chapter" id="qcm-chapter"></div>
            <div class="qcm-question" id="qcm-q"></div>
            <div id="qcm-opts"></div>
            <button class="btn btn-fill mt12" id="btn-valider" onclick="validerQCM()">Valider</button>
            <div class="qcm-feedback" id="qcm-feedback"></div>
            <button class="btn mt12 hidden" id="btn-next" onclick="nextQCM()">Question suivante</button>
            <button class="btn btn-back" onclick="goMenu()">Retour</button>
        </div>

        <!-- === END === -->
        <div id="view-end" class="hidden">
            <div class="end-box">
                <h2>Session terminée</h2>
                <p id="end-msg"></p>
                <button class="btn btn-fill" onclick="goMenu()">Retour au menu</button>
            </div>
        </div>

    </main>
</div>

<!-- === ADDON MODAL === -->
<div id="addon-modal">
    <div class="modal-box">
        <h3>Ajouter du contenu</h3>
        <p class="modal-desc">Collez le JSON fourni par l'IA pour ajouter des Flashcards et/ou des QCM. Le contenu sera sauvegardé de façon permanente.</p>
        <textarea id="addon-text" placeholder='{"flashcards": [...], "qcm": [...]}'></textarea>
        <div class="modal-row">
            <button class="btn" onclick="closeAddon()">Annuler</button>
            <button class="btn btn-fill" onclick="processAddon()">Ajouter</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// DATA — BASE CONTENT (pre-embedded)
// ============================================================
const BASE_FLASHCARDS = [
  {
    "chapter": "Juridiction constitutionnelle",
    "q": "Quels sont les trois piliers de la juridiction constitutionnelle en Suisse ?",
    "a": "1. Art. 190 Cst. (le TF doit appliquer les lois f\u00e9d\u00e9rales m\u00eame inconstitutionnelles).<br>2. Le contr\u00f4le pr\u00e9judiciel g\u00e9n\u00e9ral (tout juge peut refuser d'appliquer une ordonnance inconstitutionnelle).<br>3. La juridiction constitutionnelle du TF sur les actes normatifs cantonaux."
  },
  {
    "chapter": "Contr\u00f4le des normes",
    "q": "Quelle est la principale diff\u00e9rence entre le contr\u00f4le abstrait et le contr\u00f4le concret de constitutionnalit\u00e9 ?",
    "a": "<b>Contr\u00f4le abstrait :</b> L'acte normatif est attaqu\u00e9 directement (int\u00e9r\u00eat virtuel suffit, d\u00e9lai de 30 jours).<br><b>Contr\u00f4le concret :</b> L'acte normatif est contr\u00f4l\u00e9 \u00e0 l'occasion d'un cas d'application (int\u00e9r\u00eat actuel et concret requis)."
  },
  {
    "chapter": "Jurisprudence",
    "q": "En quoi consiste la jurisprudence 'Schubert' ?",
    "a": "C'est une exception o\u00f9 le l\u00e9gislateur suisse peut d\u00e9roger volontairement \u00e0 un trait\u00e9 international. Toutefois, cette d\u00e9rogation n'est <b>pas possible</b> pour les trait\u00e9s relatifs aux droits de l'homme (ex: CEDH), qui b\u00e9n\u00e9ficient d'une protection renforc\u00e9e (inversion Schubert)."
  },
  {
    "chapter": "Droits politiques",
    "q": "Quelles sont les conditions cumulatives pour jouir des droits politiques au niveau f\u00e9d\u00e9ral (art. 136 Cst.) ?",
    "a": "1. Avoir la nationalit\u00e9 suisse.<br>2. \u00catre \u00e2g\u00e9 de 18 ans r\u00e9volus.<br>3. Ne pas \u00eatre priv\u00e9 de l'exercice de ses droits civiques pour cause de maladie mentale ou de faiblesse d'esprit.<br>4. \u00catre inscrit sur le r\u00f4le \u00e9lectoral d'une commune."
  },
  {
    "chapter": "Droits politiques",
    "q": "Le contr\u00f4le r\u00e9trospectif d'une votation par le TF est-il fr\u00e9quent ?",
    "a": "<b>Non, il est exceptionnel.</b> Les irr\u00e9gularit\u00e9s doivent \u00eatre <b>graves et propres \u00e0 avoir influenc\u00e9 massivement le vote et son r\u00e9sultat</b>. S'il y a une nette diff\u00e9rence de voix, de graves irr\u00e9gularit\u00e9s peuvent ne pas suffire \u00e0 annuler le scrutin."
  },
  {
    "chapter": "Initiative populaire",
    "q": "Quelle est la seule limite absolue pr\u00e9vue par la Constitution (art. 139 al. 3 Cst.) \u00e0 la validit\u00e9 d'une initiative populaire ?",
    "a": "Le respect des r\u00e8gles imp\u00e9ratives du droit international (<b>ius cogens</b>), comme l'interdiction de la torture ou du g\u00e9nocide. La CEDH ou les autres trait\u00e9s ordinaires ne constituent pas des motifs d'invalidation."
  },
  {
    "chapter": "Hi\u00e9rarchie des normes",
    "q": "Quelle est la diff\u00e9rence entre une ordonnance d\u00e9pendante et ind\u00e9pendante ?",
    "a": "<b>Ordonnance d\u00e9pendante :</b> Trouve son fondement dans une loi f\u00e9d\u00e9rale (ex\u00e9cute ou substitue).<br><b>Ordonnance ind\u00e9pendante :</b> Trouve son fondement directement dans la Constitution (ex: Ordonnance COVID bas\u00e9e sur l'art. 185 al. 3 Cst.)."
  },
  {
    "chapter": "Initiative populaire",
    "q": "L'exigence de l''unit\u00e9 de la mati\u00e8re' signifie quoi ?",
    "a": "Il doit exister entre les diverses parties de l'initiative un <b>rapport intrins\u00e8que</b> et une unit\u00e9 de but. Les citoyens ne doivent pas \u00eatre contraints d'approuver une proposition qu'ils rejettent pour faire passer une proposition qu'ils soutiennent."
  },
  {
    "chapter": "Notions g\u00e9n\u00e9rales",
    "q": "Quelle est la diff\u00e9rence fondamentale entre le Droit public et le Droit priv\u00e9 (crit\u00e8re de subordination) ?",
    "a": "En droit public, il existe un rapport de subordination (l'\u00c9tat a la puissance publique et impose des r\u00e8gles imp\u00e9ratives). En droit priv\u00e9, il y a une \u00e9galit\u00e9 juridique entre les parties priv\u00e9es."
  },
  {
    "chapter": "Notions g\u00e9n\u00e9rales",
    "q": "Qu'est-ce qu'une 'd\u00e9cision' en droit public administratif ?",
    "a": "C'est un acte unilat\u00e9ral, individuel et concret, pris par un organe de l'\u00c9tat, qui a un caract\u00e8re obligatoire. (Exemple : Le retrait du permis de conduire pour 5 mois)."
  },
  {
    "chapter": "Notions g\u00e9n\u00e9rales",
    "q": "Quelle est la d\u00e9finition d'une 'Loi au sens mat\u00e9riel' ?",
    "a": "Tout acte contenant des r\u00e8gles de droit g\u00e9n\u00e9rales et abstraites (s'appliquant \u00e0 un nombre ind\u00e9termin\u00e9 de personnes et de situations), ind\u00e9pendamment de l'organe qui l'a adopt\u00e9."
  },
  {
    "chapter": "L'\u00c9tat et la Souverainet\u00e9",
    "q": "Quels sont les trois \u00e9l\u00e9ments constitutifs de l'\u00c9tat suisse depuis 1848 ?",
    "a": "1. Un <b>territoire</b>.<br>2. Une <b>population</b>.<br>3. Une <b>puissance publique effective</b>."
  },
  {
    "chapter": "L'\u00c9tat et la Souverainet\u00e9",
    "q": "Selon l'art. 3 Cst., les cantons ont-ils la souverainet\u00e9 absolue (la 'comp\u00e9tence de la comp\u00e9tence') ?",
    "a": "<b>Non.</b> L'art. 3 indique que les cantons sont souverains en tant que leur souverainet\u00e9 n'est pas limit\u00e9e par la Cst. f\u00e9d\u00e9rale. La Conf\u00e9d\u00e9ration peut modifier la r\u00e9partition des comp\u00e9tences."
  },
  {
    "chapter": "Organisation de l'\u00c9tat",
    "q": "Qu'est-ce que le 'Gouvernement d'assembl\u00e9e temp\u00e9r\u00e9' en Suisse ?",
    "a": "Le Conseil f\u00e9d\u00e9ral est \u00e9lu par l'Assembl\u00e9e f\u00e9d\u00e9rale pour 4 ans. Mais il n'y a <b>aucune interd\u00e9pendance</b> : le Parlement ne peut pas destituer le CF et le CF ne peut pas dissoudre le Parlement."
  },
  {
    "chapter": "Autorit\u00e9s f\u00e9d\u00e9rales",
    "q": "Quelles sont les caract\u00e9ristiques du 'bicam\u00e9ralisme parfait' suisse ?",
    "a": "L'Assembl\u00e9e f\u00e9d\u00e9rale est compos\u00e9e de 2 chambres qui si\u00e8gent s\u00e9par\u00e9ment et disposent d'<b>attributions strictement identiques</b>. Aucune chambre n'a la primaut\u00e9 sur l'autre."
  },
  {
    "chapter": "Autorit\u00e9s f\u00e9d\u00e9rales",
    "q": "Qu'est-ce que la 'Formule magique' ?",
    "a": "C'est une r\u00e9partition politique (\u00e9tablie en 1959) des 7 si\u00e8ges du Conseil f\u00e9d\u00e9ral entre les principaux partis gouvernementaux pour assurer une repr\u00e9sentation \u00e9quitable et la concordance."
  },
  {
    "chapter": "Les ordonnances",
    "q": "Quelle est la diff\u00e9rence entre une ordonnance d'ex\u00e9cution et une ordonnance de substitution ?",
    "a": "<b>Ex\u00e9cution :</b> Concr\u00e9tise des dispositions l\u00e9gales existantes.<br><b>Substitution :</b> Contient des r\u00e8gles <i>nouvelles</i> qui devraient normalement \u00eatre dans la loi (n\u00e9cessite une clause de d\u00e9l\u00e9gation)."
  },
  {
    "chapter": "Loi f\u00e9d\u00e9rale",
    "q": "Quelle condition d\u00e9termine si un acte de l'Assembl\u00e9e F\u00e9d\u00e9rale doit \u00eatre soumis au r\u00e9f\u00e9rendum facultatif ou non ?",
    "a": "Toutes les <b>dispositions importantes qui fixent des r\u00e8gles de droit</b> doivent prendre la forme d'une loi f\u00e9d\u00e9rale, ce qui les soumet obligatoirement au r\u00e9f\u00e9rendum facultatif."

// ============================================================
// STORAGE KEY — based on title so each course is isolated
// ============================================================
function getKey() {
    return 'UNIGE_v3_' + (userData.title || 'default').replace(/\s+/g,'_');
}

// ============================================================
// USER DATA MODEL
// ============================================================
let userData = {
    title: '',
    customFC: [],
    customQCM: [],
    // Attempt tracking: { [id]: { attempts: N, correct: N } }
    fcStats: {},
    qcmStats: {},
    // Error lists (last answer was wrong)
    errorsFC: [],
    errorsQCM: []
};

// Merged arrays (base + custom)
let ALL_FC = [];
let ALL_QCM = [];

// ============================================================
// PERSISTENCE
// ============================================================
function saveData() {
    try { localStorage.setItem(getKey(), JSON.stringify(userData)); } catch(e) {}
}

function loadData() {
    // Try to load from any key that matches our prefix (title might not be set yet)
    let saved = null;
    try {
        // First try with current title
        saved = localStorage.getItem(getKey());
        // If not found, scan all keys for our prefix
        if (!saved) {
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k && k.startsWith('UNIGE_v3_')) {
                    saved = localStorage.getItem(k);
                    break;
                }
            }
        }
    } catch(e) {}

    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            // Migrate / ensure all fields exist
            userData.title      = parsed.title      || '';
            userData.customFC   = parsed.customFC   || [];
            userData.customQCM  = parsed.customQCM  || [];
            userData.fcStats    = parsed.fcStats    || {};
            userData.qcmStats   = parsed.qcmStats   || {};
            userData.errorsFC   = parsed.errorsFC   || [];
            userData.errorsQCM  = parsed.errorsQCM  || [];
        } catch(e) {}
    }

    // Assign IDs to base data if missing
    BASE_FLASHCARDS.forEach((fc, i) => { if (!fc.id) fc.id = 'bfc_' + i; });
    BASE_QCMS.forEach((q, i) => { if (!q.id) q.id = 'bqcm_' + i; });
    userData.customFC.forEach((fc, i) => { if (!fc.id) fc.id = 'cfc_' + i; });
    userData.customQCM.forEach((q, i) => { if (!q.id) q.id = 'cqcm_' + i; });

    ALL_FC  = [...BASE_FLASHCARDS, ...userData.customFC];
    ALL_QCM = [...BASE_QCMS, ...userData.customQCM];

    renderTitle();
    renderStats();
}

// ============================================================
// TITLE (editable inline)
// ============================================================
const titleDisplay = document.getElementById('title-display');
const titleInput   = document.getElementById('title-input');

function renderTitle() {
    titleDisplay.textContent = userData.title || 'Nom de la matière';
}

titleDisplay.addEventListener('click', () => {
    titleInput.value = userData.title;
    titleDisplay.classList.add('hidden');
    titleInput.classList.remove('hidden');
    titleInput.focus();
    titleInput.select();
});

function commitTitle() {
    const newTitle = titleInput.value.trim();
    if (newTitle) userData.title = newTitle;
    titleInput.classList.add('hidden');
    titleDisplay.classList.remove('hidden');
    renderTitle();
    saveData();
}

titleInput.addEventListener('blur', commitTitle);
titleInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); commitTitle(); } });

// ============================================================
// STATISTICS RENDERING
// ============================================================
function getAccuracy(statsObj, id) {
    const s = statsObj[id];
    if (!s || s.attempts === 0) return null;
    return { attempts: s.attempts, correct: s.correct, pct: Math.round(s.correct / s.attempts * 100) };
}

function renderStats() {
    // Global row
    const totalFC  = ALL_FC.length;
    const totalQCM = ALL_QCM.length;

    // How many have been attempted at least once
    const doneFC  = ALL_FC.filter(fc => userData.fcStats[fc.id]  && userData.fcStats[fc.id].attempts > 0).length;
    const doneQCM = ALL_QCM.filter(q  => userData.qcmStats[q.id] && userData.qcmStats[q.id].attempts > 0).length;

    // Global accuracy
    let fcCorrect = 0, fcAttempts = 0, qcmCorrect = 0, qcmAttempts = 0;
    ALL_FC.forEach(fc => {
        const s = userData.fcStats[fc.id];
        if (s) { fcAttempts += s.attempts; fcCorrect += s.correct; }
    });
    ALL_QCM.forEach(q => {
        const s = userData.qcmStats[q.id];
        if (s) { qcmAttempts += s.attempts; qcmCorrect += s.correct; }
    });
    const fcPct  = fcAttempts  > 0 ? Math.round(fcCorrect  / fcAttempts  * 100) : null;
    const qcmPct = qcmAttempts > 0 ? Math.round(qcmCorrect / qcmAttempts * 100) : null;

    const globalHTML = `
        <div class="stats-row"><span class="stats-label">Flashcards</span><span class="stats-value">${doneFC}/${totalFC} faites${fcPct !== null ? ' &mdash; ' + fcPct + '% correct' : ''}</span></div>
        <div class="stats-row"><span class="stats-label">QCM</span><span class="stats-value">${doneQCM}/${totalQCM} faits${qcmPct !== null ? ' &mdash; ' + qcmPct + '% correct' : ''}</span></div>
    `;
    document.getElementById('stats-global').innerHTML = globalHTML;

    // Per-chapter breakdown
    const chapters = {};
    ALL_FC.forEach(fc => {
        const ch = fc.chapter || 'Autre';
        if (!chapters[ch]) chapters[ch] = { fcTotal:0, fcDone:0, fcCorrect:0, fcAttempts:0, qcmTotal:0, qcmDone:0, qcmCorrect:0, qcmAttempts:0 };
        chapters[ch].fcTotal++;
        const s = userData.fcStats[fc.id];
        if (s && s.attempts > 0) { chapters[ch].fcDone++; chapters[ch].fcCorrect += s.correct; chapters[ch].fcAttempts += s.attempts; }
    });
    ALL_QCM.forEach(q => {
        const ch = q.ch || q.chapter || 'Autre';
        if (!chapters[ch]) chapters[ch] = { fcTotal:0, fcDone:0, fcCorrect:0, fcAttempts:0, qcmTotal:0, qcmDone:0, qcmCorrect:0, qcmAttempts:0 };
        chapters[ch].qcmTotal++;
        const s = userData.qcmStats[q.id];
        if (s && s.attempts > 0) { chapters[ch].qcmDone++; chapters[ch].qcmCorrect += s.correct; chapters[ch].qcmAttempts += s.attempts; }
    });

    let chHTML = '';
    Object.entries(chapters).forEach(([ch, d]) => {
        const total = d.fcTotal + d.qcmTotal;
        const done  = d.fcDone  + d.qcmDone;
        const allAttempts = d.fcAttempts + d.qcmAttempts;
        const allCorrect  = d.fcCorrect  + d.qcmCorrect;
        const pct = allAttempts > 0 ? Math.round(allCorrect / allAttempts * 100) + '%' : '—';
        chHTML += `<div class="chapter-row"><span class="chapter-name">${ch}</span><span class="chapter-stats">${done}/${total} &nbsp; ${pct}</span></div>`;
    });
    document.getElementById('stats-chapters').innerHTML = chHTML;

    // Menu labels
    const errCount = userData.errorsFC.length + userData.errorsQCM.length;
    document.getElementById('lbl-fc').textContent  = totalFC  + ' cartes';
    document.getElementById('lbl-qcm').textContent = totalQCM + ' questions';
    document.getElementById('lbl-rev').textContent = errCount  + ' à corriger';

    const btnRev = document.getElementById('btn-rev');
    btnRev.disabled = errCount === 0;
}

// ============================================================
// VIEW MANAGEMENT
// ============================================================
const views = ['view-menu','view-fc','view-qcm','view-end'];
function showView(id) { views.forEach(v => document.getElementById(v).classList.toggle('hidden', v !== id)); }
function goMenu() { renderStats(); showView('view-menu'); }

// ============================================================
// FLASHCARD MODE
// ============================================================
let fcPool = [], fcIdx = 0;

function startMode(mode) {
    if (mode === 'fc') {
        if (!ALL_FC.length) { alert('Aucune flashcard disponible.'); return; }
        fcPool = shuffle([...ALL_FC]);
        fcIdx = 0;
        renderFC();
        showView('view-fc');
    } else if (mode === 'qcm') {
        if (!ALL_QCM.length) { alert('Aucun QCM disponible.'); return; }
        qcmPool = shuffle([...ALL_QCM]);
        qcmIdx = 0;
        renderQCM();
        showView('view-qcm');
    } else if (mode === 'rev') {
        const revFC  = ALL_FC.filter(fc => userData.errorsFC.includes(fc.id));
        const revQCM = ALL_QCM.filter(q  => userData.errorsQCM.includes(q.id));
        if (!revFC.length && !revQCM.length) { alert('Aucune erreur à réviser.'); return; }
        if (revFC.length) {
            fcPool = shuffle(revFC);
            fcIdx = 0;
            // After FC, continue with error QCMs
            _revQCMPending = revQCM;
            renderFC();
            showView('view-fc');
        } else {
            qcmPool = shuffle(revQCM);
            qcmIdx = 0;
            renderQCM();
            showView('view-qcm');
        }
    }
}

let _revQCMPending = [];

function renderFC() {
    if (fcIdx >= fcPool.length) {
        // If there are pending revision QCMs, start them
        if (_revQCMPending && _revQCMPending.length) {
            qcmPool = shuffle(_revQCMPending);
            _revQCMPending = [];
            qcmIdx = 0;
            renderQCM();
            showView('view-qcm');
            return;
        }
        document.getElementById('end-msg').textContent = fcPool.length + ' flashcard(s) terminées.';
        _revQCMPending = [];
        showView('view-end');
        return;
    }
    const fc = fcPool[fcIdx];
    document.getElementById('fc-counter').textContent = 'Carte ' + (fcIdx+1) + ' / ' + fcPool.length;
    document.getElementById('fc-chapter').textContent = fc.chapter || '';
    document.getElementById('fc-q').innerHTML = fc.q || '';
    document.getElementById('fc-a').innerHTML = fc.a || '';
    document.getElementById('fc-card').classList.remove('flipped');
    document.getElementById('fc-eval').classList.add('hidden');
}

function flipFC() {
    const card = document.getElementById('fc-card');
    if (!card.classList.contains('flipped')) {
        card.classList.add('flipped');
        document.getElementById('fc-eval').classList.remove('hidden');
    }
}

function evalFC(correct) {
    const fc = fcPool[fcIdx];
    // Init stats if needed
    if (!userData.fcStats[fc.id]) userData.fcStats[fc.id] = { attempts: 0, correct: 0 };
    userData.fcStats[fc.id].attempts++;
    if (correct) userData.fcStats[fc.id].correct++;

    // Error tracking (last result)
    userData.errorsFC = userData.errorsFC.filter(id => id !== fc.id);
    if (!correct) userData.errorsFC.push(fc.id);

    saveData();
    fcIdx++;
    renderFC();
}

// ============================================================
// QCM MODE
// ============================================================
let qcmPool = [], qcmIdx = 0;

function renderQCM() {
    if (qcmIdx >= qcmPool.length) {
        document.getElementById('end-msg').textContent = qcmPool.length + ' question(s) terminées.';
        showView('view-end');
        return;
    }
    const q = qcmPool[qcmIdx];
    document.getElementById('qcm-counter').textContent = 'Question ' + (qcmIdx+1) + ' / ' + qcmPool.length;
    document.getElementById('qcm-chapter').textContent = q.ch || q.chapter || '';
    document.getElementById('qcm-q').innerHTML = q.q || '';

    const optsEl = document.getElementById('qcm-opts');
    optsEl.innerHTML = '';
    const isMulti = q.fmt === 'multiple';

    (q.options || []).forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'qcm-opt';
        div.innerHTML = `<input type="${isMulti ? 'checkbox' : 'radio'}" name="qans" id="opt${i}" value="${i}">
                         <label for="opt${i}">${opt.text}</label>`;
        div.addEventListener('click', (e) => {
            if (e.target.tagName === 'INPUT') return;
            const inp = div.querySelector('input');
            if (isMulti) {
                inp.checked = !inp.checked;
                div.classList.toggle('selected', inp.checked);
            } else {
                document.querySelectorAll('.qcm-opt').forEach(d => { d.classList.remove('selected'); d.querySelector('input').checked = false; });
                inp.checked = true;
                div.classList.add('selected');
            }
        });
        optsEl.appendChild(div);
    });

    document.getElementById('btn-valider').classList.remove('hidden');
    document.getElementById('btn-next').classList.add('hidden');
    document.getElementById('qcm-feedback').style.display = 'none';
}

function validerQCM() {
    const q = qcmPool[qcmIdx];
    const optDivs = document.querySelectorAll('.qcm-opt');
    let correct = true;

    optDivs.forEach((div, i) => {
        const inp = div.querySelector('input');
        const isChecked = inp.checked;
        const isCorrect = q.options[i].isCorrect;
        if (isCorrect !== isChecked) correct = false;
        if (isCorrect) div.classList.add('correct');
        else if (isChecked) div.classList.add('wrong');
        inp.disabled = true;
        div.style.pointerEvents = 'none';
    });

    // Stats
    if (!userData.qcmStats[q.id]) userData.qcmStats[q.id] = { attempts: 0, correct: 0 };
    userData.qcmStats[q.id].attempts++;
    if (correct) userData.qcmStats[q.id].correct++;

    userData.errorsQCM = userData.errorsQCM.filter(id => id !== q.id);
    if (!correct) userData.errorsQCM.push(q.id);

    saveData();

    const fb = document.getElementById('qcm-feedback');
    fb.innerHTML = `<div class="fb-label">${correct ? 'Correct.' : 'Incorrect.'}</div><div class="fb-exp">${q.explanation || ''}</div>`;
    fb.style.display = 'block';

    document.getElementById('btn-valider').classList.add('hidden');
    document.getElementById('btn-next').classList.remove('hidden');
}

function nextQCM() {
    qcmIdx++;
    renderQCM();
}

// ============================================================
// ADDON (JSON import)
// ============================================================
function openAddon()  { document.getElementById('addon-modal').classList.add('open'); }
function closeAddon() { document.getElementById('addon-modal').classList.remove('open'); document.getElementById('addon-text').value = ''; }

function processAddon() {
    const text = document.getElementById('addon-text').value.trim();
    if (!text) return;
    try {
        const data = JSON.parse(text);
        let nFC = 0, nQCM = 0;
        if (Array.isArray(data.flashcards)) {
            data.flashcards.forEach((fc, i) => {
                if (!fc.id) fc.id = 'cfc_' + Date.now() + '_' + i;
                userData.customFC.push(fc);
                nFC++;
            });
        }
        if (Array.isArray(data.qcm)) {
            data.qcm.forEach((q, i) => {
                if (!q.id) q.id = 'cqcm_' + Date.now() + '_' + i;
                userData.customQCM.push(q);
                nQCM++;
            });
        }
        ALL_FC  = [...BASE_FLASHCARDS, ...userData.customFC];
        ALL_QCM = [...BASE_QCMS,       ...userData.customQCM];
        saveData();
        renderStats();
        closeAddon();
        alert(nFC + ' flashcard(s) et ' + nQCM + ' QCM ajoutés.');
    } catch(e) {
        alert('Format invalide. Vérifiez que vous avez collé exactement le JSON fourni.');
    }
}

// ============================================================
// DARK MODE
// ============================================================
document.getElementById('btn-theme').addEventListener('click', () => {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('btn-theme').textContent = isDark ? 'Nuit' : 'Jour';
    try { localStorage.setItem('theme', isDark ? 'light' : 'dark'); } catch(e) {}
});

// ============================================================
// UTILITY
// ============================================================
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', () => {
    try {
        const t = localStorage.getItem('theme');
        if (t === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('btn-theme').textContent = 'Jour';
        }
    } catch(e) {}
    loadData();
});
