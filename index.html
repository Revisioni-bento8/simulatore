<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #ffffff;
            --surface: #f5f5f5;
            --border:  #e0e0e0;
            --border2: #bdbdbd;
            --text:    #111111;
            --muted:   #666666;
            --faint:   #999999;
        }
        [data-theme="dark"] {
            --bg:      #111111;
            --surface: #1c1c1c;
            --border:  #2a2a2a;
            --border2: #444444;
            --text:    #f0f0f0;
            --muted:   #999999;
            --faint:   #666666;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-text-size-adjust: none; }
        body {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            transition: background 0.2s, color 0.2s;
        }
        #app { max-width: 680px; margin: 0 auto; border: 1px solid var(--border); }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        #title-display {
            font-size: 15px; font-weight: 700; cursor: pointer;
            border-bottom: 1px dashed var(--border2); min-width: 60px;
        }
        #title-display:hover { border-bottom-color: var(--text); }
        #title-input {
            font-size: 15px; font-weight: 700;
            border: none; border-bottom: 2px solid var(--text);
            background: transparent; color: var(--text);
            outline: none; width: 200px; font-family: inherit;
        }
        .hbtn {
            background: none; border: 1px solid var(--border2);
            color: var(--muted); font-size: 12px; padding: 4px 10px;
            cursor: pointer; font-family: inherit; font-weight: 500;
        }
        .hbtn:hover { color: var(--text); border-color: var(--text); }
        main { padding: 28px 20px; min-height: 50vh; }
        .stats-accordion { border: 1px solid var(--border); margin-bottom: 20px; }
        .stats-toggle {
            width: 100%; display: flex; justify-content: space-between;
            align-items: center; padding: 14px 18px;
            background: var(--surface); border: none;
            font-family: inherit; font-size: 13px; font-weight: 700;
            color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase;
            cursor: pointer; text-align: left;
        }
        .stats-toggle:hover { color: var(--text); }
        .stats-toggle .arrow { font-size: 11px; transition: transform 0.2s; }
        .stats-toggle.open .arrow { transform: rotate(180deg); }
        .stats-body { display: none; padding: 16px 18px; border-top: 1px solid var(--border); }
        .stats-body.open { display: block; }
        .stats-row { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; border-bottom: 1px solid var(--border); }
        .stats-row:last-child { border-bottom: none; }
        .stats-label { color: var(--muted); }
        .stats-value { font-weight: 600; }
        .chapter-section { margin-top: 14px; }
        .chapter-title { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--faint); margin-bottom: 8px; }
        .chapter-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .chapter-row:last-child { border-bottom: none; }
        .chapter-name { color: var(--muted); font-style: italic; }
        .chapter-stats { font-weight: 600; text-align: right; white-space: nowrap; }
        .menu-list { display: flex; flex-direction: column; border: 1px solid var(--border); }
        .menu-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 20px; font-size: 15px; font-weight: 600;
            cursor: pointer; background: var(--bg); border: none;
            color: var(--text); text-align: left;
            border-bottom: 1px solid var(--border);
            font-family: inherit; width: 100%; transition: background 0.15s;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: var(--surface); }
        .menu-item:disabled { opacity: 0.35; cursor: not-allowed; }
        .menu-item-right { font-size: 12px; font-weight: 400; color: var(--muted); }
        .counter { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 20px; }
        .fc-area { perspective: 1200px; height: 300px; margin-bottom: 20px; }
        .fc-card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); cursor: pointer; }
        .fc-card.flipped { transform: rotateY(180deg); }
        .fc-face { position: absolute; inset: 0; backface-visibility: hidden; border: 1px solid var(--border); padding: 28px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: var(--bg); overflow-y: auto; }
        .fc-back { transform: rotateY(180deg); background: var(--surface); }
        .fc-face h3 { font-size: 16px; font-weight: 600; line-height: 1.5; }
        .fc-hint { font-size: 11px; color: var(--faint); margin-top: 16px; letter-spacing: 0.05em; }
        .fc-chapter { font-size: 11px; color: var(--faint); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
        .eval-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .eval-row button { flex: 1; }
        .btn { padding: 12px 20px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); background: var(--bg); color: var(--text); width: 100%; transition: background 0.15s; }
        .btn:hover { background: var(--surface); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-fill { background: var(--text); color: var(--bg); border-color: var(--text); }
        .btn-fill:hover { opacity: 0.85; background: var(--text); }
        .btn-back { margin-top: 12px; border-color: var(--border); color: var(--muted); }
        .btn-back:hover { color: var(--text); border-color: var(--border2); }
        .qcm-chapter { font-size: 11px; color: var(--faint); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
        .qcm-question { font-size: 16px; font-weight: 600; margin-bottom: 24px; line-height: 1.5; }
        .qcm-opt { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; transition: background 0.1s, border-color 0.1s; background: var(--bg); }
        .qcm-opt:hover { background: var(--surface); }
        .qcm-opt input { margin-top: 3px; flex-shrink: 0; }
        .qcm-opt label { cursor: pointer; font-size: 14px; line-height: 1.5; }
        .qcm-opt.selected { border-color: var(--border2); background: var(--surface); }
        .qcm-opt.correct { border-color: var(--text); background: var(--surface); }
        .qcm-opt.correct label::after { content: " v"; font-weight: 700; }
        .qcm-opt.wrong label::after { content: " x"; color: var(--muted); }
        .qcm-feedback { margin-top: 16px; padding: 14px; border: 1px solid var(--border); font-size: 14px; background: var(--surface); display: none; }
        .qcm-feedback .fb-label { font-weight: 700; margin-bottom: 6px; }
        .qcm-feedback .fb-exp { color: var(--muted); }
        #addon-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        #addon-modal.open { display: flex; }
        .modal-box { background: var(--bg); border: 1px solid var(--border); max-width: 560px; width: 100%; padding: 24px; }
        .modal-box h3 { font-size: 16px; margin-bottom: 6px; }
        .modal-desc { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
        .modal-box textarea { width: 100%; height: 180px; padding: 12px; border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-family: monospace; font-size: 12px; resize: vertical; margin-bottom: 16px; }
        .modal-row { display: flex; gap: 10px; }
        .modal-row .btn { margin: 0; }
        .end-box { text-align: center; padding: 40px 20px; }
        .end-box h2 { font-size: 22px; margin-bottom: 12px; }
        .end-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
        .hidden { display: none !important; }
        .mt12 { margin-top: 12px; }
    </style>
</head>
<body>
<div id="app">
    <header>
        <div id="title-area">
            <span id="title-display" title="Touchez pour modifier"></span>
            <input id="title-input" type="text" class="hidden" maxlength="50" placeholder="Nom de la matiere...">
        </div>
        <button class="hbtn" id="btn-theme">Nuit</button>
    </header>
    <main>
        <div id="view-menu">
            <div class="stats-accordion">
                <button class="stats-toggle" id="stats-toggle" onclick="toggleStats()">
                    Statistiques <span class="arrow">&#9660;</span>
                </button>
                <div class="stats-body" id="stats-body">
                    <div id="stats-global"></div>
                    <div class="chapter-section" id="stats-chapters"></div>
                </div>
            </div>
            <div class="menu-list">
                <button class="menu-item" onclick="startMode('fc')">Flashcards <span class="menu-item-right" id="lbl-fc">-</span></button>
                <button class="menu-item" onclick="startMode('qcm')">QCM <span class="menu-item-right" id="lbl-qcm">-</span></button>
                <button class="menu-item" id="btn-rev" onclick="startMode('rev')">Revision des erreurs <span class="menu-item-right" id="lbl-rev">-</span></button>
                <button class="menu-item" onclick="openAddon()">Implementation <span class="menu-item-right">Ajouter du contenu</span></button>
            </div>
        </div>
        <div id="view-fc" class="hidden">
            <div class="counter" id="fc-counter">Carte 1 / -</div>
            <div class="fc-area">
                <div class="fc-card" id="fc-card" onclick="flipFC()">
                    <div class="fc-face fc-front">
                        <div class="fc-chapter" id="fc-chapter"></div>
                        <h3 id="fc-q"></h3>
                        <p class="fc-hint">Touchez pour retourner</p>
                    </div>
                    <div class="fc-face fc-back">
                        <div id="fc-a"></div>
                    </div>
                </div>
            </div>
            <div class="eval-row hidden" id="fc-eval">
                <button class="btn" onclick="evalFC(false)">A revoir</button>
                <button class="btn btn-fill" onclick="evalFC(true)">Je sais</button>
            </div>
            <button class="btn btn-back" onclick="goMenu()">Retour</button>
        </div>
        <div id="view-qcm" class="hidden">
            <div class="counter" id="qcm-counter">Question 1 / -</div>
            <div class="qcm-chapter" id="qcm-chapter"></div>
            <div class="qcm-question" id="qcm-q"></div>
            <div id="qcm-opts"></div>
            <button class="btn btn-fill mt12" id="btn-valider" onclick="validerQCM()">Valider</button>
            <div class="qcm-feedback" id="qcm-feedback"></div>
            <button class="btn mt12 hidden" id="btn-next" onclick="nextQCM()">Question suivante</button>
            <button class="btn btn-back" onclick="goMenu()">Retour</button>
        </div>
        <div id="view-end" class="hidden">
            <div class="end-box">
                <h2>Session terminee</h2>
                <p id="end-msg"></p>
                <button class="btn btn-fill" onclick="goMenu()">Retour au menu</button>
            </div>
        </div>
    </main>
</div>
<div id="addon-modal">
    <div class="modal-box">
        <h3>Implementation</h3>
        <p class="modal-desc">Collez le JSON. Formats acceptes: format standard du simulateur OU format original (tableau avec question/options/correct_options).</p>
        <textarea id="addon-text" placeholder='[{"id":1,"question":"...","options":{"A":"..."},"correct_options":["A"],"explanation":"..."}]'></textarea>
        <div class="modal-row">
            <button class="btn" onclick="closeAddon()">Annuler</button>
            <button class="btn btn-fill" onclick="processAddon()">Ajouter</button>
        </div>
    </div>
</div>
<script>
let userData = { title: '', programme: null, customFC: [], customQCM: [], fcStats: {}, qcmStats: {}, errorsFC: [], errorsQCM: [] };
let ALL_FC = [], ALL_QCM = [];

function getKey() { return 'UNIGE_v4_dip'; }
function saveData() { try { localStorage.setItem(getKey(), JSON.stringify(userData)); } catch(e) {} }
function loadData() {
    let saved = null;
    try { saved = localStorage.getItem(getKey()); } catch(e) {}
    if (saved) {
        try {
            const p = JSON.parse(saved);
            userData.title     = p.title     || '';
            userData.programme = p.programme || null;
            userData.customFC  = p.customFC  || [];
            userData.customQCM = p.customQCM || [];
            userData.fcStats   = p.fcStats   || {};
            userData.qcmStats  = p.qcmStats  || {};
            userData.errorsFC  = p.errorsFC  || [];
            userData.errorsQCM = p.errorsQCM || [];
        } catch(e) {}
    }
    userData.customFC.forEach((fc,i)  => { if (!fc.id) fc.id = 'cfc_' + i; });
    userData.customQCM.forEach((q,i)  => { if (!q.id)  q.id  = 'cqcm_' + i; });
    ALL_FC  = [...userData.customFC];
    ALL_QCM = [...userData.customQCM];
    renderTitle();
    renderStats();
}

const titleDisplay = document.getElementById('title-display');
const titleInput   = document.getElementById('title-input');
function renderTitle() { titleDisplay.textContent = userData.title || 'DIP'; }
titleDisplay.addEventListener('click', () => {
    titleInput.value = userData.title;
    titleDisplay.classList.add('hidden');
    titleInput.classList.remove('hidden');
    titleInput.focus(); titleInput.select();
});
function commitTitle() {
    const v = titleInput.value.trim();
    if (v) userData.title = v;
    titleInput.classList.add('hidden');
    titleDisplay.classList.remove('hidden');
    renderTitle(); saveData();
}
titleInput.addEventListener('blur', commitTitle);
titleInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); commitTitle(); } });

function toggleStats() {
    document.getElementById('stats-toggle').classList.toggle('open');
    document.getElementById('stats-body').classList.toggle('open');
}

function renderStats() {
    const totalFC = ALL_FC.length, totalQCM = ALL_QCM.length;
    const doneFC  = ALL_FC.filter(fc => userData.fcStats[fc.id]  && userData.fcStats[fc.id].attempts  > 0).length;
    const doneQCM = ALL_QCM.filter(q  => userData.qcmStats[q.id] && userData.qcmStats[q.id].attempts > 0).length;
    let fcC=0,fcA=0,qcmC=0,qcmA=0;
    ALL_FC.forEach(fc  => { const s=userData.fcStats[fc.id];  if(s){fcA+=s.attempts;  fcC+=s.correct;}  });
    ALL_QCM.forEach(q  => { const s=userData.qcmStats[q.id];  if(s){qcmA+=s.attempts; qcmC+=s.correct;} });
    const fcPct  = fcA  > 0 ? Math.round(fcC/fcA*100)   + '% correct' : '';
    const qcmPct = qcmA > 0 ? Math.round(qcmC/qcmA*100) + '% correct' : '';
    document.getElementById('stats-global').innerHTML =
        '<div class="stats-row"><span class="stats-label">Flashcards</span><span class="stats-value">' + doneFC + '/' + totalFC + ' faites' + (fcPct ? ' &mdash; ' + fcPct : '') + '</span></div>' +
        '<div class="stats-row"><span class="stats-label">QCM</span><span class="stats-value">' + doneQCM + '/' + totalQCM + ' faits' + (qcmPct ? ' &mdash; ' + qcmPct : '') + '</span></div>';
    const chapters = {};
    if (userData.programme && Array.isArray(userData.programme.chapters)) {
        userData.programme.chapters.forEach(ch => { chapters[ch] = {fcTotal:0,fcDone:0,fcC:0,fcA:0,qcmTotal:0,qcmDone:0,qcmC:0,qcmA:0}; });
    }
    ALL_FC.forEach(fc => {
        const ch = fc.chapter || 'Autre';
        if (!chapters[ch]) chapters[ch] = {fcTotal:0,fcDone:0,fcC:0,fcA:0,qcmTotal:0,qcmDone:0,qcmC:0,qcmA:0};
        chapters[ch].fcTotal++;
        const s = userData.fcStats[fc.id];
        if (s && s.attempts > 0) { chapters[ch].fcDone++; chapters[ch].fcC+=s.correct; chapters[ch].fcA+=s.attempts; }
    });
    ALL_QCM.forEach(q => {
        const ch = q.ch || q.chapter || 'Autre';
        if (!chapters[ch]) chapters[ch] = {fcTotal:0,fcDone:0,fcC:0,fcA:0,qcmTotal:0,qcmDone:0,qcmC:0,qcmA:0};
        chapters[ch].qcmTotal++;
        const s = userData.qcmStats[q.id];
        if (s && s.attempts > 0) { chapters[ch].qcmDone++; chapters[ch].qcmC+=s.correct; chapters[ch].qcmA+=s.attempts; }
    });
    let chHTML = '';
    if (Object.keys(chapters).length > 0) {
        chHTML += '<div class="chapter-title">Par chapitre</div>';
        Object.entries(chapters).forEach(([ch,d]) => {
            const total=d.fcTotal+d.qcmTotal, done=d.fcDone+d.qcmDone, allA=d.fcA+d.qcmA, allC=d.fcC+d.qcmC;
            const pct = allA > 0 ? Math.round(allC/allA*100)+'%' : '-';
            chHTML += '<div class="chapter-row"><span class="chapter-name">'+ch+'</span><span class="chapter-stats">'+done+'/'+total+' '+pct+'</span></div>';
        });
    }
    document.getElementById('stats-chapters').innerHTML = chHTML;
    const errCount = userData.errorsFC.length + userData.errorsQCM.length;
    document.getElementById('lbl-fc').textContent  = totalFC  + ' cartes';
    document.getElementById('lbl-qcm').textContent = totalQCM + ' questions';
    document.getElementById('lbl-rev').textContent = errCount + ' a corriger';
    document.getElementById('btn-rev').disabled = errCount === 0;
}

const VIEWS = ['view-menu','view-fc','view-qcm','view-end'];
function showView(id) { VIEWS.forEach(v => document.getElementById(v).classList.toggle('hidden', v !== id)); }
function goMenu() { renderStats(); showView('view-menu'); }

let fcPool=[], fcIdx=0, _pendingRevQCM=[];
function startMode(mode) {
    _pendingRevQCM = [];
    if (mode === 'fc') {
        if (!ALL_FC.length) { alert('Aucune flashcard.'); return; }
        fcPool = shuffle([...ALL_FC]); fcIdx = 0; renderFC(); showView('view-fc');
    } else if (mode === 'qcm') {
        if (!ALL_QCM.length) { alert('Aucun QCM.'); return; }
        qcmPool = shuffle([...ALL_QCM]); qcmIdx = 0; renderQCM(); showView('view-qcm');
    } else if (mode === 'rev') {
        const revFC  = ALL_FC.filter(fc => userData.errorsFC.includes(fc.id));
        const revQCM = ALL_QCM.filter(q  => userData.errorsQCM.includes(q.id));
        if (!revFC.length && !revQCM.length) { alert('Aucune erreur.'); return; }
        if (revFC.length) { fcPool = shuffle(revFC); fcIdx = 0; _pendingRevQCM = revQCM; renderFC(); showView('view-fc'); }
        else { qcmPool = shuffle(revQCM); qcmIdx = 0; renderQCM(); showView('view-qcm'); }
    }
}

function renderFC() {
    if (fcIdx >= fcPool.length) {
        if (_pendingRevQCM.length) { qcmPool = shuffle(_pendingRevQCM); _pendingRevQCM = []; qcmIdx = 0; renderQCM(); showView('view-qcm'); return; }
        document.getElementById('end-msg').textContent = fcPool.length + ' flashcard(s) terminees.';
        showView('view-end'); return;
    }
    const fc = fcPool[fcIdx];
    document.getElementById('fc-counter').textContent = 'Carte ' + (fcIdx+1) + ' / ' + fcPool.length;
    document.getElementById('fc-chapter').textContent = fc.chapter || '';
    document.getElementById('fc-q').innerHTML         = fc.q || '';
    document.getElementById('fc-a').innerHTML         = fc.a || '';
    document.getElementById('fc-card').classList.remove('flipped');
    document.getElementById('fc-eval').classList.add('hidden');
}
function flipFC() {
    const card = document.getElementById('fc-card');
    if (!card.classList.contains('flipped')) { card.classList.add('flipped'); document.getElementById('fc-eval').classList.remove('hidden'); }
}
function evalFC(correct) {
    const fc = fcPool[fcIdx];
    if (!userData.fcStats[fc.id]) userData.fcStats[fc.id] = {attempts:0,correct:0};
    userData.fcStats[fc.id].attempts++;
    if (correct) userData.fcStats[fc.id].correct++;
    userData.errorsFC = userData.errorsFC.filter(id => id !== fc.id);
    if (!correct) userData.errorsFC.push(fc.id);
    saveData(); fcIdx++; renderFC();
}

let qcmPool=[], qcmIdx=0;
function renderQCM() {
    if (qcmIdx >= qcmPool.length) {
        document.getElementById('end-msg').textContent = qcmPool.length + ' question(s) terminees.';
        showView('view-end'); return;
    }
    const q = qcmPool[qcmIdx];
    document.getElementById('qcm-counter').textContent = 'Question ' + (qcmIdx+1) + ' / ' + qcmPool.length;
    document.getElementById('qcm-chapter').textContent = q.ch || q.chapter || '';
    document.getElementById('qcm-q').innerHTML         = q.q || '';
    const optsEl = document.getElementById('qcm-opts');
    optsEl.innerHTML = '';
    const isMulti = q.fmt === 'multiple';
    (q.options||[]).forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'qcm-opt';
        div.innerHTML = '<input type="' + (isMulti?'checkbox':'radio') + '" name="qans" id="opt'+i+'" value="'+i+'"><label for="opt'+i+'">' + opt.text + '</label>';
        div.addEventListener('click', e => {
            if (e.target.tagName === 'INPUT') return;
            const inp = div.querySelector('input');
            if (isMulti) { inp.checked = !inp.checked; div.classList.toggle('selected', inp.checked); }
            else {
                document.querySelectorAll('.qcm-opt').forEach(d => { d.classList.remove('selected'); d.querySelector('input').checked = false; });
                inp.checked = true; div.classList.add('selected');
            }
        });
        optsEl.appendChild(div);
    });
    document.getElementById('btn-valider').classList.remove('hidden');
    document.getElementById('btn-next').classList.add('hidden');
    document.getElementById('qcm-feedback').style.display = 'none';
}
function validerQCM() {
    const q = qcmPool[qcmIdx];
    const optDivs = document.querySelectorAll('.qcm-opt');
    let correct = true;
    optDivs.forEach((div, i) => {
        const inp = div.querySelector('input');
        const isChecked = inp.checked;
        const isCorrect = q.options[i].isCorrect;
        if (isCorrect !== isChecked) correct = false;
        if (isCorrect) div.classList.add('correct');
        else if (isChecked) div.classList.add('wrong');
        inp.disabled = true; div.style.pointerEvents = 'none';
    });
    if (!userData.qcmStats[q.id]) userData.qcmStats[q.id] = {attempts:0,correct:0};
    userData.qcmStats[q.id].attempts++;
    if (correct) userData.qcmStats[q.id].correct++;
    userData.errorsQCM = userData.errorsQCM.filter(id => id !== q.id);
    if (!correct) userData.errorsQCM.push(q.id);
    saveData();
    const fb = document.getElementById('qcm-feedback');
    fb.innerHTML = '<div class="fb-label">' + (correct ? 'Correct.' : 'Incorrect.') + '</div><div class="fb-exp">' + (q.explanation||'') + '</div>';
    fb.style.display = 'block';
    document.getElementById('btn-valider').classList.add('hidden');
    document.getElementById('btn-next').classList.remove('hidden');
}
function nextQCM() { qcmIdx++; renderQCM(); }

function openAddon()  { document.getElementById('addon-modal').classList.add('open'); }
function closeAddon() { document.getElementById('addon-modal').classList.remove('open'); document.getElementById('addon-text').value = ''; }

function convertOriginalFormat(arr) {
    return arr.map((item, i) => {
        const opts = [];
        if (item.options && !Array.isArray(item.options)) {
            ['A','B','C','D','E','F'].forEach(letter => {
                if (item.options[letter] !== undefined) {
                    opts.push({
                        text: letter + '. ' + item.options[letter],
                        isCorrect: Array.isArray(item.correct_options)
                            ? item.correct_options.includes(letter)
                            : item.correct_option === letter
                    });
                }
            });
        }
        const correctCount = opts.filter(o => o.isCorrect).length;
        return {
            id: 'cqcm_' + Date.now() + '_' + i,
            q: item.question || item.q || '',
            ch: item.ch || item.chapter || 'DIP',
            fmt: correctCount > 1 ? 'multiple' : 'single',
            options: opts,
            explanation: item.explanation || ''
        };
    });
}

function processAddon() {
    const text = document.getElementById('addon-text').value.trim();
    if (!text) return;
    try {
        const data = JSON.parse(text);
        let nFC=0, nQCM=0, hasProgramme=false;

        if (!Array.isArray(data) && data.programme) { userData.programme = data.programme; hasProgramme = true; }

        if (!Array.isArray(data) && Array.isArray(data.flashcards)) {
            data.flashcards.forEach((fc, i) => { if (!fc.id) fc.id = 'cfc_' + Date.now() + '_' + i; userData.customFC.push(fc); nFC++; });
        }

        if (!Array.isArray(data) && Array.isArray(data.qcm)) {
            data.qcm.forEach((q, i) => { if (!q.id) q.id = 'cqcm_' + Date.now() + '_' + i; userData.customQCM.push(q); nQCM++; });
        }

        if (Array.isArray(data) && data.length > 0 && (data[0].question || data[0].correct_options)) {
            const converted = convertOriginalFormat(data);
            converted.forEach(q => { userData.customQCM.push(q); nQCM++; });
        }

        ALL_FC  = [...userData.customFC];
        ALL_QCM = [...userData.customQCM];
        saveData(); renderStats(); closeAddon();

        let msg = '';
        if (hasProgramme) msg += 'Programme charge. ';
        if (nFC)  msg += nFC  + ' flashcard(s) ajoutee(s). ';
        if (nQCM) msg += nQCM + ' QCM ajoute(s).';
        if (!msg) msg = 'Aucun contenu reconnu.';
        alert(msg);
    } catch(e) {
        alert('JSON invalide: ' + e.message);
    }
}

document.getElementById('btn-theme').addEventListener('click', () => {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('btn-theme').textContent = isDark ? 'Nuit' : 'Jour';
    try { localStorage.setItem('theme', isDark ? 'light' : 'dark'); } catch(e) {}
});

function shuffle(arr) {
    for (let i=arr.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}

window.addEventListener('load', () => {
    try {
        const t = localStorage.getItem('theme');
        if (t === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); document.getElementById('btn-theme').textContent = 'Jour'; }
    } catch(e) {}
    loadData();
});
</script>
